<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Lojão do Lar Lírio dos Vales</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="container header-container">
      <div class="logo">
        <h1>Lírio dos Vales</h1>
        <span>Lojão do Lar</span>
      </div>
      <nav class="nav-menu" id="navMenu">
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="contato.html" class="active">Contato</a></li>
          <li><a href="#" id="cartIconBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></a></li>
        </ul>
      </nav>
      <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </div>
  </header>

  <main>
    <div class="container contato-container">
      <div class="contato-info">
        <h2>Fale com a gente</h2>
        <p>Dúvidas, sugestões ou elogios? Estamos à disposição para tornar sua experiência ainda melhor.</p>
        <div class="social-links">
          <a href="#" id="whatsappLink" class="social-icon whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
          <a href="#" id="instagramLink" class="social-icon instagram"><i class="fab fa-instagram"></i> Instagram</a>
        </div>
      </div>
      <div class="contato-form">
        <form id="contactForm">
          <div class="form-group">
            <label for="name">Nome completo</label>
            <input type="text" id="name" placeholder="Seu nome" required>
            <span class="error-msg" id="nameError"></span>
          </div>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
            <span class="error-msg" id="emailError"></span>
          </div>
          <div class="form-group">
            <label for="message">Mensagem</label>
            <textarea id="message" rows="4" placeholder="Escreva sua mensagem..." required></textarea>
            <span class="error-msg" id="msgError"></span>
          </div>
          <button type="submit" class="btn-primary">Enviar Mensagem</button>
          <div id="formFeedback" class="form-feedback"></div>
        </form>
      </div>
    </div>
  </main>

  <div id="cartModal" class="cart-modal">
    <div class="cart-modal-content">
      <span class="close-cart">&times;</span>
      <h3><i class="fas fa-shopping-bag"></i> Meu Carrinho</h3>
      <ul id="cartItemsList" class="cart-items-list"></ul>
      <div class="cart-total"><strong>Total:</strong> <span id="cartTotal">R$ 0,00</span></div>
      <button id="clearCartBtn" class="btn-secondary">Limpar carrinho</button>
      <button class="btn-primary" id="closeCartBtn">Continuar comprando</button>
    </div>
  </div>

  <footer class="footer">
    <div class="container"><p>&copy; 2025 Lojão do Lar Lírio dos Vales</p></div>
  </footer>

  <script src="script.js"></script>
  <script>
    inicializarContato();
  </script>
</body>
</html>
