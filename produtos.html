<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - Lojão do Lar Lírio dos Vales</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="container header-container">
      <div class="logo">
        <h1>Lírio dos Vales</h1>
        <span>Lojão do Lar</span>
      </div>
      <nav class="nav-menu" id="navMenu">
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html" class="active">Produtos</a></li>
          <li><a href="contato.html">Contato</a></li>
          <li><a href="#" id="cartIconBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></a></li>
        </ul>
      </nav>
      <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="filtros-wrapper">
        <h2>Nossos Produtos</h2>
        <div class="filter-bar">
          <button class="filter-btn active" data-cat="todos">Todos</button>
          <button class="filter-btn" data-cat="moveis">Móveis</button>
          <button class="filter-btn" data-cat="decoracao">Decoração</button>
          <button class="filter-btn" data-cat="cozinha">Cozinha</button>
          <button class="filter-btn" data-cat="iluminacao">Iluminação</button>
        </div>
      </div>
      <div class="products-grid" id="produtosGrid"></div>
    </div>
  </main>

  <div id="cartModal" class="cart-modal">
    <div class="cart-modal-content">
      <span class="close-cart">&times;</span>
      <h3><i class="fas fa-shopping-bag"></i> Meu Carrinho</h3>
      <ul id="cartItemsList" class="cart-items-list"></ul>
      <div class="cart-total"><strong>Total:</strong> <span id="cartTotal">R$ 0,00</span></div>
      <button id="clearCartBtn" class="btn-secondary">Limpar carrinho</button>
      <button class="btn-primary" id="closeCartBtn">Continuar comprando</button>
    </div>
  </div>

  <footer class="footer">
    <div class="container"><p>&copy; 2025 Lojão do Lar Lírio dos Vales</p></div>
  </footer>

  <script src="script.js"></script>
  <script>
    carregarTodosProdutos();
    inicializarFiltros();
  </script>
</body>
</html>
